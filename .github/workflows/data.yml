name: Data reproduces INDEC

# The pipeline must still reproduce INDEC's published figures (`make data`), and the committed
# artifact must match what the pipeline emits. Path-filtered to the pipeline/data files so a
# web-only PR doesn't depend on INDEC's server; the pinned source zip is cached on its checksum
# so reruns don't re-download it.
#
# Note: a PR/branch created by the monthly data-update workflow's GITHUB_TOKEN will NOT trigger
# this CI (a GitHub limitation). Checks appear once a human pushes to the bump branch. If you
# make this a required check, configure branch protection to treat a skipped run as passing
# (web-only PRs won't run it).

on:
  pull_request:
    paths:
      - "pipeline/**"
      - "data/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/data.yml"
  push:
    branches: [master, main]
    paths:
      - "pipeline/**"
      - "data/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/data.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  data:
    name: Pipeline reproduces INDEC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync Python deps
        run: uv sync
      - name: Cache the pinned INDEC source (keyed on the checksum pin)
        uses: actions/cache@v4
        with:
          path: data/raw
          key: eph-raw-${{ hashFiles('data/checksums.txt') }}
      - name: Build + validate the data artifact
        run: make data
      - name: Committed artifact matches the pipeline output (numeric tolerance)
        run: |
          git show HEAD:data/percentiles.v1.json > committed-data.json
          git show HEAD:web/public/percentiles.v1.json > committed-web.json
          uv run python -m pipeline.artifact_check committed-data.json data/percentiles.v1.json
          uv run python -m pipeline.artifact_check committed-web.json web/public/percentiles.v1.json
